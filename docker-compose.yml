version: "3.9"

services:
  backend:
    build: ./backend
    command: npm run dev
    ports:
      - "3500:3500"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_ORIGIN=http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
